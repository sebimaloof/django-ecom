{% extends "index.html" %}

{% block content %}
<div class='sing'>


    <div class="single-image">
        <img src="{{ product.product_image.url }}" alt="{{ product.name }}">
    </div>

    <div class="single-right">
        <h1>{{ product.product_name }}</h1>

        <div class="single-description">
            <p>{{ product.description }}</p>
        </div>
        <div class="single-price">
            <p class="sing-curr" style="color: red;">Price: ${{ product.current_price }}</p>
            <p>$ <del>{{ product.old_price }}</del></p>


        </div>
        <div class="btn-single">
            <a href="{% url 'hi' product.id %}">
            <div class="button">
                <p style="color: rgb(28, 12, 4);">Add To Cart</p>
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-cart4"
                    viewBox="0 0 16 16">
                    <path
                        d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l.5 2H5V5zM6 5v2h2V5zm3 0v2h2V5zm3 0v2h1.36l.5-2zm1.11 3H12v2h.61zM11 8H9v2h2zM8 8H6v2h2zM5 8H3.89l.5 2H5zm0 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0" />
                </svg>
            </div>
            </a>


        </div>

    </div>

</div>

{% endblock content %}
